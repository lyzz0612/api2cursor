services:
  api2cursor:
    image: ghcr.io/lyzz0612/api2cursor:latest
    # 本地开发时注释掉 image 并取消下行注释，使用本地构建：
    # build: .
    container_name: api2cursor
    ports:
      # 默认容器内监听 3029（与 config 默认一致）。若改容器内端口，需同步 ports 右侧与 healthcheck，并设置 environment.PROXY_PORT
      - "3029:3029"
    environment:
      # ACCESS_API_KEY：必填。仅用于管理面板 /admin 与 /api/admin；请改为强随机字符串（勿与 Cursor 内填的中转站 API Key 混淆）。
      ACCESS_API_KEY: "replace-with-a-strong-secret"
      API_TIMEOUT: "300"
      DEBUG_MODE: "off"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3029/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
